<html lang="es">
<head>
<meta charset="UTF-8">

<title>Retribuciones PDI Funcionario — Portal de Transparencia UCM</title>
<meta name="description" content="Retribuciones del Personal Docente e Investigador Funcionario de la Universidad Complutense de Madrid. Portal de Transparencia.">
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root {
  --rojo: #b71234;
  --rojo-dk: #8b0d27;
  --rojo-lt: #f5e6ea;
  --rojo-pale: #fef7f8;
  --negro: #1a1a1a;
  --gris: #4b5563;
  --gris-m: #6b7280;
  --gris-c: #f3f4f6;
  --borde: #e5e7eb;
  --blanco: #ffffff;
  --fn: 'DM Sans', system-ui, sans-serif;
  --fs: 'Source Serif 4', Georgia, serif;
  --radius: 10px;
  --tr: .18s ease;
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box }
html { scroll-behavior:smooth; font-size:16px }
body {
  font-family: var(--fn);
  background: #eef0f4;
  color: var(--negro);
  min-height: 100vh;
  padding: 24px 16px 60px;
  line-height: 1.6;
}
.wrap { max-width: 1100px; margin: 0 auto; }

/* ── HEADER ── */
.hdr {
  background: linear-gradient(135deg, var(--rojo) 0%, var(--rojo-dk) 100%);
  border-radius: var(--radius) var(--radius) 0 0;
  padding: 24px 32px 22px;
  display: flex;
  align-items: flex-start;
  gap: 16px;
  flex-wrap: wrap;
}
.hdr-escudo {
  width: 52px; height: 52px;
  background: rgba(255,255,255,.15);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; flex-shrink: 0;
  border: 2px solid rgba(255,255,255,.25);
}
.hdr-text h1 {
  font-family: var(--fs);
  font-size: 22px; font-weight: 600;
  color: #fff; line-height: 1.2;
}
.hdr-text p {
  font-size: 12.5px; color: rgba(255,255,255,.75);
  margin-top: 4px; font-weight: 400; letter-spacing: .01em;
}
.hdr-text p a { color: rgba(255,255,255,.9); text-decoration: underline; text-underline-offset: 2px; }
.hdr-text p a:hover { color: #fff; }

/* ── TOOLBAR ── */
.toolbar {
  background: var(--blanco);
  border: 1px solid var(--borde); border-top: none;
  padding: 14px 32px;
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
}
.ctrl-group { display:flex; flex-direction:column; gap:3px; }
.ctrl-label {
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .07em; color: var(--gris-m);
}
.year-btns { display: flex; gap: 4px; }
.ybtn {
  padding: 7px 16px;
  border: 2px solid var(--borde); border-radius: 7px;
  background: var(--blanco); color: var(--gris);
  font-family: var(--fn); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all var(--tr); white-space: nowrap;
}
.ybtn:hover { border-color: var(--rojo); color: var(--rojo); }
.ybtn.act {
  background: var(--rojo); border-color: var(--rojo); color: #fff;
  box-shadow: 0 2px 8px rgba(183,18,52,.3);
}
.export-group { display:flex; gap:8px; margin-left:auto; }
.ebtn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border: none; border-radius: 7px;
  font-family: var(--fn); font-size: 12px; font-weight: 700;
  cursor: pointer; color: #fff; letter-spacing: .02em;
  transition: all var(--tr); white-space: nowrap;
}
.ebtn:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,.2); }
.ebtn.xlsx { background: #1d6f42; }
.ebtn.csv  { background: #155d36; }
.ebtn svg  { width:14px; height:14px; flex-shrink:0; }

/* ── MAIN ── */
.main {
  background: var(--blanco);
  border: 1px solid var(--borde); border-top: none;
  border-radius: 0 0 var(--radius) var(--radius);
  padding: 28px 32px 40px;
}

/* ── KPI ── */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px; margin-bottom: 30px;
}
.kpi {
  background: var(--rojo-pale);
  border: 1px solid var(--rojo-lt); border-top: 3px solid var(--rojo);
  border-radius: var(--radius); padding: 16px 18px 14px;
  transition: box-shadow var(--tr), transform var(--tr);
}
.kpi:hover { box-shadow: 0 4px 16px rgba(183,18,52,.1); transform: translateY(-2px); }
.kpi-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--gris-m); margin-bottom: 6px; }
.kpi-val { font-family: var(--fs); font-size: 24px; color: var(--rojo); line-height: 1.1; margin-bottom: 3px; }
.kpi-sub { font-size: 11px; color: var(--gris-m); }

/* ── SECTION HEADERS ── */
.sec-hdr {
  display: flex; align-items: baseline; gap: 12px;
  margin-bottom: 14px; padding-bottom: 10px;
  border-bottom: 2px solid var(--rojo-lt); flex-wrap: wrap;
}
.sec-hdr h2 { font-family: var(--fs); font-size: 18px; font-weight: 400; color: var(--rojo-dk); }
.sec-tag { font-size: 11px; color: var(--gris-m); font-style: italic; }

/* ── NOTE ── */
.nota {
  background: #fff8e1; border: 1px solid #ffe082;
  border-left: 4px solid #f59e0b; border-radius: 7px;
  padding: 9px 14px; font-size: 12.5px; color: #78350f;
  margin-bottom: 24px; line-height: 1.5;
}

/* ── SECTION SPACER ── */
.section-block { margin-bottom: 36px; }

/* ── TABLE ── */
.tw {
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  border-radius: 8px; border: 1px solid var(--borde);
  box-shadow: 0 1px 4px rgba(0,0,0,.04);
  margin-bottom: 8px;
}
table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
thead tr { background: linear-gradient(135deg, var(--rojo) 0%, var(--rojo-dk) 100%); }
thead th {
  padding: 11px 14px; text-align: left;
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .05em;
  color: #fff; white-space: nowrap;
}
thead th.num { text-align: right; }
.subhdr td {
  background: #f9eaed;
  font-size: 10.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .06em;
  color: var(--rojo-dk); padding: 6px 14px;
  border-bottom: 1px solid var(--rojo-lt);
}
tbody tr { border-bottom: 1px solid var(--borde); transition: background var(--tr); }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--rojo-pale); }
tbody tr:nth-child(even):not(.subhdr) { background: #fafafa; }
tbody tr:nth-child(even):not(.subhdr):hover { background: var(--rojo-pale); }
td { padding: 10px 14px; vertical-align: middle; }
td.cat-cell { font-weight: 600; color: var(--negro); min-width: 80px; }
td.ded-cell { color: var(--gris); font-size: 12.5px; }
td.num { text-align: right; white-space: nowrap; }
.badge-a {
  display: inline-block; background: #dbeafe; color: #1e40af;
  border-radius: 5px; padding: 2px 9px;
  font-size: 12.5px; font-weight: 700; white-space: nowrap;
}
.badge-m {
  display: inline-block; background: #dcfce7; color: #166534;
  border-radius: 5px; padding: 2px 9px;
  font-size: 12.5px; font-weight: 700; white-space: nowrap;
}
.badge-e {
  display: inline-block; background: #fef3c7; color: #92400e;
  border-radius: 5px; padding: 2px 9px;
  font-size: 12.5px; font-weight: 700; white-space: nowrap;
}
.badge-s {
  display: inline-block; background: #f3e8ff; color: #6b21a8;
  border-radius: 5px; padding: 2px 9px;
  font-size: 12.5px; font-weight: 700; white-space: nowrap;
}

/* ── DETAIL TABLE (sueldo, c.destino, c.especifico breakdown) ── */
.detail-cols th { font-size: 10px; }

/* ── INFO BOX ── */
.info-box {
  background: var(--gris-c); border: 1px solid var(--borde);
  border-radius: 8px; padding: 12px 16px; font-size: 12px;
  color: var(--gris); line-height: 1.6; margin-top: 10px;
}

/* ── FUENTE ── */
.fuente {
  margin-top: 28px; font-size: 12px; color: var(--gris-m);
  line-height: 1.6; border-top: 1px solid var(--borde); padding-top: 16px;
}
.fuente a { color: var(--rojo-dk); text-decoration: none; font-weight: 600; }
.fuente a:hover { text-decoration: underline; }

/* ── TOGGLE DETAIL ── */
.toggle-detail {
  font-size: 11px; color: var(--rojo-dk); cursor: pointer;
  background: none; border: none; font-family: var(--fn);
  font-weight: 600; padding: 0; text-decoration: underline;
  text-underline-offset: 2px; margin-bottom: 10px;
  display: inline-block;
}
.toggle-detail:hover { color: var(--rojo); }

/* ── FOOTER ── */
.footer { text-align: center; margin-top: 24px; font-size: 12px; color: var(--gris-m); }
.footer a { color: var(--rojo-dk); text-decoration: none; font-weight: 600; }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  body { padding: 12px 8px 40px; }
  .hdr { padding: 18px 20px; }
  .hdr-text h1 { font-size: 17px; }
  .toolbar { padding: 12px 20px; gap:10px; }
  .main { padding: 20px 20px 32px; }
  .kpi-row { grid-template-columns: 1fr 1fr; }
  .export-group { margin-left: 0; }
}
@media (max-width: 500px) {
  .hdr-escudo { display: none; }
  .kpi-row { grid-template-columns: 1fr; }
  .year-btns { flex-wrap: wrap; }
  .ybtn { font-size: 12px; padding: 6px 12px; }
  .ebtn { font-size: 11px; padding: 7px 12px; }
}
:focus-visible { outline: 3px solid var(--rojo); outline-offset: 2px; border-radius: 3px; }
</style>
</head>

let currentYear = 2025;

/* ══════════════════════════════════════════
   UTILIDADES
══════════════════════════════════════════ */
const fmt = n => {
  if (n == null || isNaN(n)) return '—';
  return n.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
};

/* ══════════════════════════════════════════
   RENDER
══════════════════════════════════════════ */
function render() {
  const d = DATOS[currentYear];

  // Group by category
  const catMap = {};
  d.salarios.forEach(r => {
    if (!catMap[r.cat]) catMap[r.cat] = [];
    catMap[r.cat].push(r);
  });
  const cats = Object.keys(catMap);

  // Top salary (CU TC)
  const topSal = d.salarios.find(s => s.cat === 'CATEDRÁTICOS DE UNIVERSIDAD' && s.ded === 'TIEMPO COMPLETO');
  const minSal = [...d.salarios].sort((a,b) => a.total - b.total)[0];

  // Build salary table rows
  let salRows = '';
  cats.forEach(cat => {
    const items = catMap[cat];
    salRows += `<tr class="subhdr"><td colspan="${showDetail ? 6 : 3}">${cat}</td></tr>`;
    items.forEach(r => {
      if (showDetail) {
        salRows += `<tr>
          <td class="ded-cell">${r.ded}</td>
          <td class="num"><span class="badge-s">${fmt(r.sueldo12)}</span></td>
          <td class="num"><span class="badge-s">${fmt(r.cDestino12)}</span></td>
          <td class="num"><span class="badge-s">${r.cEspecifico14 > 0 ? fmt(r.cEspecifico14) : '—'}</span></td>
          <td class="num"><span class="badge-s">${fmt(r.pagasExtra)}</span></td>
          <td class="num"><span class="badge-a">${fmt(r.total)}</span></td>
        </tr>`;
      } else {
        salRows += `<tr>
          <td class="ded-cell">${r.ded}</td>
          <td class="num"><span class="badge-a">${fmt(r.total)}</span></td>
        </tr>`;
      }
    });
  });

  const detailHeader = showDetail
    ? `<th scope="col" class="num" style="min-width:130px">Sueldo<br><small>(12 meses)</small></th>
       <th scope="col" class="num" style="min-width:130px">C. Destino<br><small>(12 meses)</small></th>
       <th scope="col" class="num" style="min-width:130px">C. Específico<br><small>(14 meses)</small></th>
       <th scope="col" class="num" style="min-width:120px">Pagas extra</th>
       <th scope="col" class="num" style="min-width:130px">Total anual</th>`
    : `<th scope="col" class="num" style="min-width:150px">Total anual</th>`;

  // Build trienio rows
  let trRows = d.trienios.map(r => `
    <tr>
      <td class="ded-cell">${r.ded}</td>
      <td class="num"><span class="badge-m">${fmt(r.meses)}</span></td>
      <td class="num"><span class="badge-m">${fmt(r.pagasExtra)}</span></td>
      <td class="num"><span class="badge-a">${fmt(r.total)}</span></td>
    </tr>
  `).join('');

  // Build evaluaciones rows
  let evalRows = d.evaluaciones.map(r => `
    <tr>
      <td class="cat-cell">${r.cat}</td>
      <td class="num"><span class="badge-e">${fmt(r.anual)}</span></td>
    </tr>
  `).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="kpi-row">
      <div class="kpi">
        <div class="kpi-lbl">Año seleccionado</div>
        <div class="kpi-val">${currentYear}</div>
        <div class="kpi-sub">Subida salarial: ${d.subida}</div>
      </div>
      <div class="kpi">
        <div class="kpi-lbl">Máximo (CU · T.C.)</div>
        <div class="kpi-val">${topSal ? fmt(topSal.total) : '—'}</div>
        <div class="kpi-sub">Catedrático tiempo completo</div>
      </div>
      <div class="kpi">
        <div class="kpi-lbl">Mínimo (TEU · 3h.)</div>
        <div class="kpi-val">${minSal ? fmt(minSal.total) : '—'}</div>
        <div class="kpi-sub">T.E.U. a T.P. 3 horas</div>
      </div>
    </div>

    ${d.nota ? `<div class="nota">ℹ️ ${d.nota}</div>` : ''}

    <!-- TABLA 1: SALARIOS -->
    <div class="section-block">
      <div class="sec-hdr">
        <h2>Retribuciones ${currentYear} (subida ${d.subida})</h2>
        <span class="sec-tag">Importe total anual por categoría y dedicación</span>
      </div>
      <button class="toggle-detail" onclick="toggleDetail()">
        ${showDetail ? '▲ Ocultar desglose (sueldo / c. destino / c. específico)' : '▼ Ver desglose por componentes salariales'}
      </button>
      <div class="tw">
        <table aria-label="Retribuciones PDI Funcionario ${currentYear}" class="${showDetail ? 'detail-cols' : ''}">
          <thead>
            <tr>
              <th scope="col" style="min-width:280px">Dedicación / Horas lectivas</th>
              ${detailHeader}
            </tr>
          </thead>
          <tbody>${salRows}</tbody>
        </table>
      </div>
      <div class="info-box" style="margin-top:10px; font-size:11.5px;">
        * Paga extra = Sueldo paga extra (inferior al mensual) + C. Destino (igual al mensual). El complemento específico se percibe distribuido en 14 mensualidades solo para el régimen de tiempo completo.
      </div>
    </div>

    <!-- TABLA 2: TRIENIOS -->
    <div class="section-block">
      <div class="sec-hdr">
        <h2>Antigüedad: Importe de cada trienio</h2>
        <span class="sec-tag">Independiente de la categoría docente</span>
      </div>
      <div class="tw">
        <table aria-label="Trienios PDI Funcionario ${currentYear}">
          <thead>
            <tr>
              <th scope="col" style="min-width:160px">Dedicación</th>
              <th scope="col" class="num" style="min-width:120px">12 meses</th>
              <th scope="col" class="num" style="min-width:130px">2 pagas extra</th>
              <th scope="col" class="num" style="min-width:120px">Total anual</th>
            </tr>
          </thead>
          <tbody>${trRows}</tbody>
        </table>
      </div>
    </div>

    <!-- TABLA 3: EVALUACIONES -->
    <div class="section-block">
      <div class="sec-hdr">
        <h2>Importe de cada evaluación docente o investigadora</h2>
        <span class="sec-tag">Por evaluación positiva acreditada</span>
      </div>
      <div class="tw">
        <table aria-label="Evaluaciones PDI Funcionario ${currentYear}">
          <thead>
            <tr>
              <th scope="col" style="min-width:300px">Categoría</th>
              <th scope="col" class="num" style="min-width:150px">Importe anual</th>
            </tr>
          </thead>
          <tbody>${evalRows}</tbody>
        </table>
      </div>
      <div class="info-box">
        Cada profesor a tiempo completo puede percibir un máximo de <strong>seis evaluaciones docentes</strong> y <strong>seis evaluaciones investigadoras</strong>, las primeras tras una evaluación de 5 años de docencia y las segundas tras la evaluación de 6 años de actividad investigadora.
      </div>
    </div>

    <!-- COMPLEMENTO ADICIONAL -->
    <div class="section-block">
      <div class="sec-hdr">
        <h2>Importe del complemento adicional</h2>
      </div>
      <div class="info-box">
        ${d.complemento_adicional}
      </div>
    </div>

    <div class="fuente">
      <strong>Fuente:</strong>
      <a href="https://www.ucm.es/servicio-de-coordinacion,-nominas-y-seguros-sociales" target="_blank" rel="noopener">
        Vicegerencia de Recursos Humanos – UCM
      </a>
      &nbsp;·&nbsp;
      Datos fuente: <strong>${d.fuente_fecha}</strong>
      &nbsp;·&nbsp;
      ${currentYear === 2022 ? 'Fuente original: documento Word (nov. 2022), convertido a tabla estructurada.' : 'Fuente original: archivo Excel (XLS) publicado en el Portal de Transparencia UCM.'}
    </div>
  `;
}

function setYear(y) {
  currentYear = y;
  document.querySelectorAll('.ybtn').forEach(b => {
    b.classList.toggle('act', +b.dataset.year === y);
  });
  render();
}

function toggleDetail() {
  showDetail = !showDetail;
  render();
}

/* ══════════════════════════════════════════
   EXPORTACIÓN
══════════════════════════════════════════ */
function buildExportRows() {
  const d = DATOS[currentYear];
  const rows = [
    [`Universidad Complutense de Madrid — Retribuciones PDI Funcionario ${currentYear}`],
    [`Fuente: Vicegerencia de Recursos Humanos · Subida salarial: ${d.subida} · Datos fuente: ${d.fuente_fecha}`],
    [],
    ['TABLA 1: RETRIBUCIONES ANUALES'],
    ['Categoría', 'Dedicación / Horas lectivas', 'Sueldo 12 meses (€)', 'C. Destino 12 meses (€)', 'C. Específico 14 meses (€)', 'Pagas extra (€)', 'Total anual (€)'],
  ];
  d.salarios.forEach(r => rows.push([r.cat, r.ded, r.sueldo12, r.cDestino12, r.cEspecifico14, r.pagasExtra, r.total]));
  rows.push([]);
  rows.push(['TABLA 2: ANTIGÜEDAD – IMPORTE DE CADA TRIENIO']);
  rows.push(['Dedicación', '12 meses (€)', '2 pagas extra (€)', 'Total anual (€)']);
  d.trienios.forEach(r => rows.push([r.ded, r.meses, r.pagasExtra, r.total]));
  rows.push([]);
  rows.push(['TABLA 3: IMPORTE DE CADA EVALUACIÓN DOCENTE O INVESTIGADORA']);
  rows.push(['Categoría', 'Importe anual (€)']);
  d.evaluaciones.forEach(r => rows.push([r.cat, r.anual]));
  rows.push([]);
  rows.push(['COMPLEMENTO ADICIONAL']);
  rows.push([d.complemento_adicional]);
  rows.push([]);
  rows.push(['* Paga extra = Sueldo paga extra (inferior al mensual) + C. Destino (igual al mensual)']);
  return rows;
}

function exportXLSX() {
  const rows = buildExportRows();
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!merges'] = [
    {s:{r:0,c:0},e:{r:0,c:6}},
    {s:{r:1,c:0},e:{r:1,c:6}},
  ];
  ws['!cols'] = [{wch:50},{wch:26},{wch:22},{wch:24},{wch:26},{wch:18},{wch:18}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, `PDI Funcionario ${currentYear}`);
  XLSX.writeFile(wb, `UCM_Retribuciones_PDI_Funcionario_${currentYear}.xlsx`);
}

function exportCSV() {
  const rows = buildExportRows();
  const csv = 'sep=;\r\n' + rows.map(r =>
    r.map(c => {
      const s = c == null ? '' : String(c);
      return s.includes(';') || s.includes('"') ? `"${s.replace(/"/g,'""')}"` : s;
    }).join(';')
  ).join('\r\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF' + csv], {type:'text/csv;charset=utf-8;'}));
  a.download = `UCM_Retribuciones_PDI_Funcionario_${currentYear}.csv`;
  a.click();
}

/* ══════════════════════════════════════════
   INICIO
══════════════════════════════════════════ */
render();
</script>
</body>
